project:
  name: VocalMorph
  version: "2.0.0"
  author: Asnan P
  description: VocalMorph V2 subset evaluation config

data:
  nisp_dir: data/nisp/
  raw_dir: data/raw/
  processed_dir: data/processed/
  features_dir: data/features_subset_eval/
  augmented_dir: data/augmented/
  targets:
    - height_cm
    - weight_kg
    - age
    - gender
  sample_rate: 16000
  max_audio_duration: 10
  min_audio_duration: 2

features:
  mfcc:
    n_mfcc: 40
    n_fft: 512
    hop_length: 160
    win_length: 400
    include_delta: true
    include_delta_delta: true
  formants:
    n_formants: 4
    max_formant: 5500
    window_length: 0.025
  pitch:
    method: "praat"
    min_pitch: 50
    max_pitch: 500
  spectral:
    centroid: true
    rolloff: true
    flux: true
    bandwidth: true
    contrast: true
  vtl:
    estimate: true
    speed_of_sound: 34000
  voice_quality:
    jitter: true
    shimmer: true
    hnr: true

model:
  name: VocalMorphV2
  type: dual_path_ecapa_conformer_monotonic
  v2:
    ecapa_channels: 128
    ecapa_scale: 4
    conformer_d_model: 64
    conformer_heads: 4
    conformer_blocks: 1
    dropout: 0.15

physics:
  enabled: true
  vtl_height_constraint:
    enabled: true
    ratio: 6.7
    penalty_weight: 0.1
  formant_vtl_constraint:
    enabled: true
    speed_of_sound: 34000
    penalty_weight: 0.1
  f0_gender_constraint:
    enabled: true
    male_f0_range: [85, 180]
    female_f0_range: [165, 265]
    penalty_weight: 0.05

training:
  epochs: 5
  batch_size: 16
  gradient_accumulation_steps: 1
  num_workers: 0
  device: cpu
  mixed_precision: false
  seed: 42
  ema:
    enabled: true
    decay: 0.995
    update_every: 1
    warmup_steps: 0
    use_for_eval: true
  optimizer:
    type: adamw
    lr: 0.0005
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    type: cosine_annealing_warm_restarts
    T_0: 5
    T_mult: 1
    eta_min: 0.00001
  loss:
    type: vtsl_v2
    task_weights:
      height: 3.0
      weight: 1.0
      age: 1.0
      gender: 0.5
      vtsl: 0.2
      physics_penalty: 0.1
      domain_adv: 0.05
    use_gender_class_weights: true
    physics_penalty_weight: 0.1
  early_stopping:
    enabled: false
    patience: 10
    monitor: height_mae_speaker
    mode: min
  gradient_clipping:
    enabled: true
    max_norm: 1.0

evaluation:
  targets:
    height_mae_cm: 3.0
    weight_mae_kg: 5.0
    age_mae_years: 5.0
    gender_accuracy: 0.95
  inference:
    use_ensemble: true
    deterministic: true
    n_samples: 4
    n_crops: 3
    crop_size: 96

logging:
  wandb:
    enabled: false
    project: VocalMorph
    entity: asnanp
  tensorboard:
    enabled: true
    log_dir: outputs/subset_eval/logs/
  checkpoint:
    dir: outputs/subset_eval/checkpoints/
    save_top_k: 3
    monitor: height_mae_speaker
    mode: min

inference:
  checkpoint: outputs/subset_eval/checkpoints/best.ckpt
  mc_samples: 50
  deterministic_ensemble: true
  n_crops: 3
  crop_size: 96
  output_uncertainty: true
  output_dir: outputs/subset_eval/predictions/
  audio_enhancement:
    enabled: true
    vad_aggressiveness: 2
    spectral_gate_strength: 1.30
    spectral_gate_floor: 0.10
    trim_db: 26.0
