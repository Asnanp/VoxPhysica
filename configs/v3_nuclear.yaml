# ============================================================
# VocalMorph V3 — Nuclear Height Estimation Config
# ============================================================
# Optimized for RTX 3060 (12GB VRAM)
# Unified training for ALL heights. No short/tall segmentation.
# Conformer + physics cross-attention + multi-objective loss = target 2-3cm MAE.

project:
  name: VocalMorph-V3
  version: "3.2.0"
  author: Asnan P
  description: >
    V3.2 — deeper Conformer, hierarchical pooling, Wing+Huber loss,
    multi-token physics cross-attention, height calibration head,
    5-bin structural supervision, stronger regularization.

data:
  features_dir: data/features_audited/
  split_manifests:
    train: data/splits/train_clean.csv
    val: data/splits/val_clean.csv
    test: data/splits/test_clean.csv
  sample_rate: 16000

features:
  strict: true
  require_parselmouth: true
  normalize_spectral: true
  audit:
    strict_backend_check: true
    require_parselmouth: true
  mfcc:
    n_mfcc: 40
    n_fft: 512
    hop_length: 160
    win_length: 400
    include_delta: true
    include_delta_delta: true
  formants:
    n_formants: 4
    max_formant: 5500
    window_length: 0.025
  pitch:
    method: praat
    min_pitch: 50
    max_pitch: 500
  spectral:
    centroid: true
    rolloff: true
    flux: true
    bandwidth: true
    contrast: true
  vtl:
    estimate: true
    speed_of_sound: 34000

model:
  name: VocalMorphV3
  input_dim: 136
  v3:
    # Deeper/wider Conformer for richer representations
    d_model: 384
    n_heads: 8
    n_blocks: 6
    ff_expansion: 4
    conv_kernel: 15
    dropout: 0.22
    drop_path: 0.12
    pool_heads: 4
    pool_hidden: 192
    # V3.2 features
    n_height_bins: 5
    use_physics_cross_attn: true
    use_height_bin_aux: true
    use_feature_mixup: true
    mixup_alpha: 0.2
    use_hierarchical_pooling: true
    use_height_calibration: true
    physics_tokens: 4
    tower_hidden_dim: 320

training:
  seed: 123
  epochs: 120
  batch_size: 24
  gradient_accumulation_steps: 5   # effective batch = 120
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true
  device: auto
  amp: true
  mixed_precision: true
  allow_tf32: true
  max_feature_frames: 768
  train_crop_mode: random
  eval_crop_mode: center

  # No speaker batching — plain shuffled
  speaker_batching:
    enabled: false

  # Feature augmentation — ENABLED with stronger regularization
  augmentation:
    enabled: true
    noise_p: 0.55
    noise_std: 0.018
    time_mask_p: 0.35
    time_mask_max_frac: 0.15
    feat_mask_p: 0.30
    feat_mask_max_frac: 0.12
    scale_p: 0.45
    scale_std: 0.06
    temporal_jitter_p: 0.30
    temporal_jitter_max_frac: 0.06

  # EMA for smoother evaluation
  ema:
    enabled: true
    decay: 0.9997
    update_every: 1
    warmup_steps: 300
    use_for_eval: true

  optimizer:
    type: adamw
    lr: 0.00015
    weight_decay: 0.10
    betas: [0.9, 0.98]

  scheduler:
    type: cosine_annealing
    T_max: 120
    eta_min: 0.0000005

  # Multi-objective height-focused loss
  loss:
    huber_delta: 0.3
    huber_weight: 0.5
    wing_weight: 0.5
    wing_width: 5.0
    wing_curvature: 0.5
    ranking_weight: 0.25
    ranking_margin: 0.15
    isometric_weight: 0.08
    height_bin_weight: 0.2
    gender_weight: 0.1
    label_smoothing: 0.05
    calibration_reg_weight: 0.01

  # Linear LR warmup
  lr_warmup_epochs: 8
  lr_warmup_start_factor: 0.005

  # Feature smoothing during training
  feature_smoothing_std: 0.018

  early_stopping:
    enabled: true
    patience: 30
    monitor: height_mae_speaker
    mode: min

  gradient_clipping:
    enabled: true
    max_norm: 0.8

logging:
  tensorboard:
    enabled: true
    log_dir: outputs/v3/logs/
  checkpoint:
    dir: outputs/v3/checkpoints/
    save_top_k: 3
    monitor: height_mae_speaker
    mode: min
