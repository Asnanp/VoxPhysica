# ============================================================
# VocalMorph V3 — Nuclear Height Estimation Config
# ============================================================
# Optimized for RTX 3060 (12GB VRAM)
# Unified training for ALL heights. No short/tall segmentation.
# Conformer + physics cross-attention + multi-objective loss = target 2-3cm MAE.

project:
  name: VocalMorph-V3
  version: "3.1.0"
  author: Asnan P
  description: Improved V3 with ranking loss, isometric regularization, physics cross-attention, and height-bin auxiliary

data:
  features_dir: data/features_audited/
  split_manifests:
    train: data/splits/train_clean.csv
    val: data/splits/val_clean.csv
    test: data/splits/test_clean.csv
  sample_rate: 16000

features:
  strict: true
  require_parselmouth: true
  normalize_spectral: true
  audit:
    strict_backend_check: true
    require_parselmouth: true
  mfcc:
    n_mfcc: 40
    n_fft: 512
    hop_length: 160
    win_length: 400
    include_delta: true
    include_delta_delta: true
  formants:
    n_formants: 4
    max_formant: 5500
    window_length: 0.025
  pitch:
    method: praat
    min_pitch: 50
    max_pitch: 500
  spectral:
    centroid: true
    rolloff: true
    flux: true
    bandwidth: true
    contrast: true
  vtl:
    estimate: true
    speed_of_sound: 34000

model:
  name: VocalMorphV3
  input_dim: 136
  v3:
    # Reduced capacity to prevent overfitting (was 512d/6 blocks)
    d_model: 256
    n_heads: 8
    n_blocks: 4
    ff_expansion: 4
    conv_kernel: 15
    dropout: 0.20
    drop_path: 0.08
    pool_heads: 4
    pool_hidden: 128
    # New V3.1 features
    n_height_bins: 3
    use_physics_cross_attn: true
    use_height_bin_aux: true
    use_feature_mixup: true
    mixup_alpha: 0.2

training:
  seed: 123
  epochs: 100
  batch_size: 32
  gradient_accumulation_steps: 4   # effective batch = 128 (was 16 = 512, too large)
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true
  device: auto
  amp: true
  mixed_precision: true
  allow_tf32: true
  max_feature_frames: 768
  train_crop_mode: random
  eval_crop_mode: center

  # No speaker batching — plain shuffled
  speaker_batching:
    enabled: false

  # Feature augmentation — ENABLED for regularization
  augmentation:
    enabled: true
    noise_p: 0.50
    noise_std: 0.015
    time_mask_p: 0.30
    time_mask_max_frac: 0.12
    feat_mask_p: 0.25
    feat_mask_max_frac: 0.10
    scale_p: 0.40
    scale_std: 0.05
    temporal_jitter_p: 0.25
    temporal_jitter_max_frac: 0.05

  # EMA for smoother evaluation
  ema:
    enabled: true
    decay: 0.999
    update_every: 1
    warmup_steps: 200
    use_for_eval: true

  optimizer:
    type: adamw
    lr: 0.0002
    weight_decay: 0.08
    betas: [0.9, 0.98]

  scheduler:
    type: cosine_annealing
    T_max: 100
    eta_min: 0.000001

  # Multi-objective height-focused loss
  loss:
    huber_delta: 0.5
    huber_weight: 1.0
    ranking_weight: 0.2
    ranking_margin: 0.15
    isometric_weight: 0.05
    height_bin_weight: 0.15
    gender_weight: 0.1
    label_smoothing: 0.05

  # Linear LR warmup
  lr_warmup_epochs: 5
  lr_warmup_start_factor: 0.01

  # Feature smoothing during training
  feature_smoothing_std: 0.015

  early_stopping:
    enabled: true
    patience: 25
    monitor: height_mae_speaker
    mode: min

  gradient_clipping:
    enabled: true
    max_norm: 1.0

logging:
  tensorboard:
    enabled: true
    log_dir: outputs/v3/logs/
  checkpoint:
    dir: outputs/v3/checkpoints/
    save_top_k: 3
    monitor: height_mae_speaker
    mode: min
