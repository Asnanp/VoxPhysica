project:
  name: VocalMorph
  version: "2.1.0-elite"
  author: Asnan P
  description: ECAPA-TDNN multi-task voice-to-biometric prediction - RTX 3060 Elite Edition

data:
  nisp_dir: data/nisp/
  raw_dir: data/raw/
  processed_dir: data/processed/
  features_dir: data/features/
  augmented_dir: data/augmented/

  targets:
    - height_cm
    - weight_kg
    - age
    - gender

  sample_rate: 16000
  max_audio_duration: 10
  min_audio_duration: 2

  split:
    train: 0.70
    val: 0.15
    test: 0.15
    stratify_by: gender
    random_seed: 42

features:
  mfcc:
    n_mfcc: 40
    n_fft: 512
    hop_length: 160
    win_length: 400
    include_delta: true
    include_delta_delta: true

  formants:
    n_formants: 4
    max_formant: 5500
    window_length: 0.025

  pitch:
    method: "praat"
    min_pitch: 50
    max_pitch: 500

  spectral:
    centroid: true
    rolloff: true
    flux: true
    bandwidth: true
    contrast: true

  vtl:
    estimate: true
    speed_of_sound: 34000

  voice_quality:
    jitter: true
    shimmer: true
    hnr: true

model:
  name: VocalMorphV2
  type: dual_path_ecapa_conformer_monotonic

  v2:
    ecapa_channels: 512
    ecapa_scale: 8
    ecapa_embedding_dim: 192

    conformer_d_model: 256
    conformer_heads: 8
    conformer_blocks: 4

    dropout: 0.3

  gradient_checkpointing: true
  memory_efficient_attention: true

physics:
  enabled: true

  vtl_height_constraint:
    enabled: true
    ratio: 6.7
    penalty_weight: 0.15

  formant_vtl_constraint:
    enabled: true
    speed_of_sound: 34000
    penalty_weight: 0.12

  f0_gender_constraint:
    enabled: true
    male_f0_range: [85, 180]
    female_f0_range: [165, 265]
    penalty_weight: 0.08

training:
  seed: 46
  epochs: 100
  batch_size: 32
  gradient_accumulation_steps: 1
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 4
  device: cuda
  mixed_precision: true
  allow_tf32: true
  max_feature_frames: 960
  train_crop_mode: random
  eval_crop_mode: center
  
  # GPU memory optimizations
  pin_memory: true
  non_blocking: true
  empty_cache_frequency: 50
  
  # Elite training techniques
  gradient_checkpointing: true
  use_channels_last: false
  
  ema:
    enabled: true
    decay: 0.999
    update_every: 1
    warmup_steps: 1000
    use_for_eval: true

  optimizer:
    type: adamw
    lr: 0.0003
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1e-8

  scheduler:
    type: cosine_annealing_warm_restarts
    T_0: 10
    T_mult: 2
    eta_min: 0.000001
    
  # Learning rate warmup for elite convergence
  lr_warmup_epochs: 5
  lr_warmup_start_factor: 0.1

  loss:
    type: vtsl_v2

    task_weights:
      height: 4.0
      weight: 1.5
      age: 1.2
      gender: 0.8
      vtsl: 0.3
      physics_penalty: 0.15
      domain_adv: 0.08

    use_gender_class_weights: true
    physics_penalty_weight: 0.15
    
    # Elite loss enhancements
    label_smoothing: 0.1
    focal_gamma: 2.0
    focal_after_epoch: 20

  early_stopping:
    enabled: true
    patience: 20
    monitor: height_mae_speaker
    mode: min
    min_delta: 0.01

  gradient_clipping:
    enabled: true
    max_norm: 0.5
    
  # Advanced augmentation for elite performance
  augmentation:
    enabled: true
    noise_p: 0.6
    noise_std: 0.03
    time_mask_p: 0.5
    time_mask_max_frac: 0.15
    feat_mask_p: 0.4
    feat_mask_max_frac: 0.10
    scale_p: 0.4
    scale_std: 0.10
    temporal_jitter_p: 0.3
    temporal_jitter_max_frac: 0.08
    freq_mask_p: 0.35
    freq_mask_max_frac: 0.20
    mixup_p: 0.25
    mixup_alpha: 0.25

  # Stochastic Weight Averaging for better generalization
  swa:
    enabled: true
    start_frac: 0.75
    anneal_epochs: 15
    use_for_eval: true

evaluation:
  targets:
    height_mae_cm: 3.0
    weight_mae_kg: 5.0
    age_mae_years: 5.0
    gender_accuracy: 0.95
  inference:
    use_ensemble: true
    deterministic: true
    n_samples: 8
    n_crops: 5
    crop_size: 256

logging:
  wandb:
    enabled: false
    project: VocalMorph
    entity: asnanp

  tensorboard:
    enabled: true
    log_dir: outputs/logs_rtx3060_elite/

  checkpoint:
    dir: outputs/checkpoints_rtx3060_elite/
    save_top_k: 5
    monitor: height_mae_speaker
    mode: min

inference:
  checkpoint: outputs/checkpoints_rtx3060_elite/best.ckpt
  mc_samples: 100
  deterministic_ensemble: true
  n_crops: 7
  crop_size: 256
  output_uncertainty: true
  output_dir: outputs/predictions_rtx3060_elite/
  quality_gate:
    enabled: true
    strict: true
    min_capture_quality_score: 0.60
    min_speech_ratio: 0.60
    min_snr_db: 12.0
    max_distance_cm: 30.0
    max_clipped_ratio: 0.02
    require_quality_ok: false
    min_accepted_clips: 3
  audio_enhancement:
    enabled: true
    vad_aggressiveness: 2
    spectral_gate_strength: 1.5
    spectral_gate_floor: 0.08
    trim_db: 30.0
    min_speech_ratio: 0.50
    min_snr_db: 10.0
    max_clipped_ratio: 0.015
    max_distance_cm: 40.0